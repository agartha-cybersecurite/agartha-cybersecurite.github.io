  <text x="300" y="292" font-family="Space Grotesk, Sora, Outfit, Inter, Arial, sans-serif" font-weight="600" font-size="88" letter-spacing="18" fill="url(#agarthaText)">AGARTHA</text>
  <text x="303" y="350" font-family="Geist Mono, IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" letter-spacing="7" fill="#B9B3D6">SÉCURITÉ APPLICATIVE &amp; GOUVERNANCE CYBER</text>
  <text x="303" y="410" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="28" fill="#D8D3E7">Cartographier, analyser et réduire vos risques applicatifs.</text>
